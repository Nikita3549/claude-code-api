services:
  api:
    build:
      context: .
    container_name: claude-code-api
    profiles:
      - api
    restart: always
    ports:
      - ${PORT}:${PORT}
    volumes:
      - ./.env:/opt/api/.env
  db:
    image: postgres:17-alpine
    container_name: claude-code-api-db
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${DB_PORT}:5432"

networks:
  main:
    driver: bridge

volumes:
  db-data:
